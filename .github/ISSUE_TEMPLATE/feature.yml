name: Nova capacidade
description: Propor melhoria de produto, jogo, conteúdo ou documentação
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: textarea
    attributes:
      label: Problema
      description: Qual necessidade será resolvida?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    attributes:
      label: Critérios de aceite
      placeholder: "- [ ] Critério observável"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Área
      options: [Produto, Conteúdo, Gameplay, UX, Segurança, Cloud, Documentação]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Riscos, dependências e evidências
