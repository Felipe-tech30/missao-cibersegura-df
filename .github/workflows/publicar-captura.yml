name: Publicar captura completa do jogo
on:
  push:
    branches: [main]
    paths:
      - ".upload/gameplay-ready.txt"

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruir e validar PNG
        shell: bash
        run: |
          mkdir -p assets/screenshots
          cat .upload/gameplay-part-*.b64 | base64 --decode > assets/screenshots/gameplay-missao-cibersegura.tmp.png
          python - <<'PY'
          from pathlib import Path
          import struct

          path = Path("assets/screenshots/gameplay-missao-cibersegura.tmp.png")
          data = path.read_bytes()
          if not data.startswith(b"\x89PNG\r\n\x1a\n"):
              raise SystemExit("Arquivo gerado nao e PNG")
          width, height = struct.unpack(">II", data[16:24])
          if (width, height) != (1280, 720):
              raise SystemExit(f"Dimensoes inesperadas: {width}x{height}")
          if not data.endswith(b"IEND\xaeB\x60\x82"):
              raise SystemExit("PNG incompleto")
          print(f"PNG validado: {width}x{height}, {len(data)} bytes")
          PY
          mv assets/screenshots/gameplay-missao-cibersegura.tmp.png assets/screenshots/gameplay-missao-cibersegura.png
      - name: Publicar captura
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/screenshots/gameplay-missao-cibersegura.png
          git commit -m "docs: substitui captura completa do jogo"
          git push
