name: Finalizar apresentacao da banca
on:
  push:
    branches: [main]
    paths:
      - ".upload/presentation-part-*.b64"
permissions:
  contents: write
jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruir PPTX
        shell: bash
        run: |
          mkdir -p presentation
          cat .upload/presentation-part-*.b64 | base64 --decode > presentation/pcdf-missao-cibersegura-banca.pptx
      - name: Publicar apresentacao
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add presentation/pcdf-missao-cibersegura-banca.pptx
          git commit -m "docs: adiciona apresentacao editavel da banca"
          git push
